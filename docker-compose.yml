services:
  cuda-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuda-dev
    working_dir: /work
    volumes:
      - ./src:/work
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]